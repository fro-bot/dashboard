---
name: Release

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - package.json
      - pnpm-lock.yaml
      - 'tsconfig*.json'
      - 'src/**'
      - 'web/**'
      - 'public/**'
      - .github/workflows/release.yaml
      - scripts/should-release.ts
      - scripts/compute-release-tag.ts
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash -Eeuo pipefail {0}

jobs:
  guard:
    name: Release guard
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}

    steps:
      - name: ⤵ Checkout (with history for push range)
        if: github.event_name == 'push'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: 🟢 Set up Node.js
        if: github.event_name == 'push'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: 🔍 Evaluate release gate
        id: check
        env:
          GITHUB_REF_NAME_FOR_LOG: ${{ github.ref }}
        run: |
          # workflow_dispatch: only release when triggered from main.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "Manual dispatch on main: releasing."
              echo "should-release=true" >> "$GITHUB_OUTPUT"
            else
              printf 'Manual dispatch on non-main ref (%s): skipping release.\n' "$GITHUB_REF_NAME_FOR_LOG"
              echo "should-release=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Collect all changed files across the entire pushed range.
          # github.event.before is the SHA before the push; github.sha is the tip.
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # First push to branch — all tracked files at HEAD are "new".
            echo "First push to branch — listing all tracked files as changed."
            CHANGED=$(git ls-files)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          fi
          echo "Changed files:"
          echo "$CHANGED"

          # Extract base package.json from the before commit
          BASE_PKG=$(mktemp)
          trap 'rm -f "$BASE_PKG"' EXIT
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # No parent commit — use an empty object as base
            echo '{}' > "$BASE_PKG"
          else
            if ! git show "${BEFORE}:package.json" > "$BASE_PKG" 2>/dev/null; then
              # package.json didn't exist in the before commit — use empty object
              echo '{}' > "$BASE_PKG"
            fi
          fi

          # Run the guard script
          if node scripts/should-release.ts \
              --changed-files "$CHANGED" \
              --base-pkg "$BASE_PKG" \
              --head-pkg package.json; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          else
            EXIT=$?
            if [ "$EXIT" -eq 1 ]; then
              echo "should-release=false" >> "$GITHUB_OUTPUT"
            else
              echo "Guard script error (exit $EXIT)" >&2
              exit "$EXIT"
            fi
          fi

  release:
    name: Release
    needs: [guard]
    if: needs.guard.outputs.should-release == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.calver.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      # Act as fro-bot[bot] (not the Actions user) so tags + releases are authored by
      # the App identity, matching fro-bot/.github + fro-bot/agent automation.
      # NOTE: The GitHub App must have contents:write + metadata:read on its installation
      # for tag push and release creation to succeed. GHCR push uses GITHUB_TOKEN below.
      - name: 🤖 Get App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: ⤵ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          # Persist the App token so `git push` of the release tag is authored by fro-bot[bot].
          token: ${{ steps.app-token.outputs.token }}

      # GHCR only accepts GITHUB_TOKEN (same-repo packages) or a classic PAT — NOT a
      # GitHub App installation token. The job's packages:write permission scopes this
      # GITHUB_TOKEN to push ghcr.io/<this repo>. The App token is still used for the
      # identity-sensitive git tag push + GitHub Release below (fro-bot[bot] authorship).
      - name: 🔑 Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 🏗️ Build and push candidate image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}:ci-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 🧪 Smoke-test candidate image by digest
        run: |
          IMG="ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
          trap 'docker rm -f dashboard-smoke >/dev/null 2>&1 || true; docker network rm smoke-net >/dev/null 2>&1 || true' EXIT
          docker network create smoke-net
          COOKIE_KEY=$(openssl rand -hex 32)
          docker run -d --name dashboard-smoke --network smoke-net \
            -e DASHBOARD_COOKIE_KEY="$COOKIE_KEY" -e DASHBOARD_OPERATOR_LOGIN=smoke-test \
            -p 127.0.0.1:8080:3000 "$IMG"
          # poll host-published port (catches 127.0.0.1 bind regression)
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/healthz >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          # sibling-container reachability: run a throwaway container on the same smoke-net
          # network hitting the service by container name — mimics Caddy -> app over docker
          # network (catches a 127.0.0.1-only bind that passes the host-port poll but would
          # cause 502s from a reverse proxy reaching the app by service name).
          sib=0
          if docker run --rm --network smoke-net "$IMG" node -e \
              "fetch('http://dashboard-smoke:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" \
              >/dev/null 2>&1; then sib=1; fi
          if [ "$ok" != 1 ] || [ "$sib" != 1 ]; then
            echo "SMOKE FAILED (host_port_ok=$ok sibling_ok=$sib)"
            docker logs dashboard-smoke || true
            exit 1
          fi
          # Verify the SPA web/dist/ was built into the image and is served.
          # /manifest.webmanifest is a public (pre-auth) path — no cookie needed.
          spa=0
          if curl -fsS http://127.0.0.1:8080/manifest.webmanifest >/dev/null 2>&1; then spa=1; fi
          if [ "$spa" != 1 ]; then
            echo "SMOKE FAILED: SPA manifest not served (web/dist/ missing from image?)"
            docker logs dashboard-smoke || true
            exit 1
          fi
          # Verify CSP header is present and contains the pinned script-src 'self' directive.
          csp_ok=0
          CSP_HEADER=$(curl -fsS -I http://127.0.0.1:8080/api/healthz 2>/dev/null | tr -d '\r' | grep -i '^content-security-policy:' || true)
          if echo "$CSP_HEADER" | grep -q "script-src 'self'"; then csp_ok=1; fi
          if [ "$csp_ok" != 1 ]; then
            echo "SMOKE FAILED: CSP header missing or script-src 'self' not present"
            echo "CSP header: $CSP_HEADER"
            docker logs dashboard-smoke || true
            exit 1
          fi
          echo "smoke OK (healthz=$ok sibling=$sib spa_manifest=$spa csp=$csp_ok)"

      - name: 🧹 Cleanup smoke containers
        if: always()
        run: |
          docker rm -f dashboard-smoke || true
          docker network rm smoke-net || true

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: 🏷️ Compute and push release tag
        id: calver
        run: |
          git fetch --tags --force

          TAG=""
          for attempt in 1 2 3 4 5; do
            TAG="$(node scripts/compute-release-tag.ts)"
            echo "Attempt $attempt: tagging $TAG"
            if git tag "$TAG" "${{ github.sha }}" && git push origin "$TAG"; then
              echo "Pushed tag $TAG"
              break
            fi
            echo "Tag push failed (race?), refetching and retrying..."
            git tag -d "$TAG" 2>/dev/null || true
            git fetch --tags --force
            TAG=""
            sleep 2
          done

          if [ -z "$TAG" ]; then
            echo "Failed to push release tag after 5 attempts"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 📦 Promote candidate digest to stable tags
        run: |
          CALVER="${{ steps.calver.outputs.tag }}"
          SRC="ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          for TAG in "$CALVER" "latest" "sha-${SHORT_SHA}"; do
            for attempt in 1 2 3; do
              if docker buildx imagetools create \
                  --tag "ghcr.io/${{ github.repository }}:$TAG" "$SRC"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "promote failed for $TAG after 3 attempts"
                exit 1
              fi
              echo "promote attempt $attempt failed for $TAG, retrying..."
              sleep 3
            done
          done

          # Verify promoted tags resolve to the smoke-tested digest
          for TAG in "$CALVER" "latest" "sha-${SHORT_SHA}"; do
            got=$(docker buildx imagetools inspect \
              "ghcr.io/${{ github.repository }}:$TAG" \
              --format '{{.Manifest.Digest}}')
            if [ "$got" != "${{ steps.build.outputs.digest }}" ]; then
              echo "DIGEST MISMATCH on $TAG: got=$got expected=${{ steps.build.outputs.digest }}"
              exit 1
            fi
          done
          echo "digest verification OK"

      - name: 🚀 Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CALVER="${{ steps.calver.outputs.tag }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          SHA="${{ github.sha }}"

          gh release create "$CALVER" \
            --title "$CALVER" \
            --generate-notes

          EXISTING_BODY="$(gh release view "$CALVER" --json body -q .body)"
          REPO="${{ github.repository }}"
          IMAGE_BLOCK="$(printf '\n\n## Image\n\nImage: ghcr.io/%s:%s\nDigest: ghcr.io/%s@%s\nSource: %s' "$REPO" "$CALVER" "$REPO" "$DIGEST" "$SHA")"

          gh release edit "$CALVER" \
            --notes "${EXISTING_BODY}${IMAGE_BLOCK}"

      - name: 🧹 Cleanup on failure (delete tag + release)
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.calver.outputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No tag was pushed; nothing to clean up."
            exit 0
          fi
          echo "Cleaning up remote tag $TAG and any partial release..."
          git push origin ":refs/tags/$TAG" 2>/dev/null || echo "Remote tag $TAG not found or already deleted."
          gh release delete "$TAG" --yes 2>/dev/null || echo "Release $TAG not found or already deleted."
          echo "Cleanup complete."

  # Dispatch the gated infra deploy for the version just released. Best-effort: this
  # runs AFTER the release job, so a dispatch failure never affects the published
  # image/tag/release. The infra `deploy-dashboard.yaml` validates the version,
  # independently resolves+verifies the digest, and waits on the operator approval
  # gate (environment: dashboard in infra) before deploying — this dispatch only
  # reaches that gate, it does not bypass it.
  #
  # Auth: a short-lived token minted from a private key created exclusively for this
  # dashboard→infra dispatch (NOT the fro-bot release App above). The token is scoped
  # to marcusrbrown/infra + actions:write. NOTE (see dashboard#112): mint-time scoping
  # narrows the token, not a key-leak blast radius — the secret is environment-scoped
  # to `release` as the primary mitigation; a dedicated infra-only App is the deferred fix.
  dispatch-deploy:
    name: Dispatch infra deploy
    needs: [release]
    if: needs.release.result == 'success' && needs.release.outputs.tag != '' && needs.release.outputs.digest != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Best-effort for the WHOLE job: the release is already published, so nothing here
    # may fail the workflow run. continue-on-error covers every step — validation,
    # token mint (which WILL fail until the INFRA_DISPATCH_* secrets are provisioned),
    # and dispatch — so a missing secret or infra-contract gap warns without reddening
    # the release. Failed steps still surface in the run UI as the actionable signal.
    continue-on-error: true
    # Scopes the INFRA_DISPATCH_* secrets to this job only — no other workflow/job
    # in the repo can read the dispatch key.
    environment: release
    permissions:
      contents: read
    steps:
      - name: 🔎 Validate the released version + digest
        env:
          VERSION: ${{ needs.release.outputs.tag }}
          DIGEST: ${{ needs.release.outputs.digest }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]{4}\.[0-9]{2}\.[0-9]+$'; then
            echo "::warning title=Deploy dispatch skipped::'$VERSION' is not a valid CalVer (YYYY.MM.N); not dispatching. The release is published."
            exit 1
          fi
          # Fail fast on a malformed digest rather than dispatching a bad payload that
          # only infra would catch (defense-in-depth; mirrors the CalVer check).
          if ! printf '%s' "$DIGEST" | grep -Eq '^sha256:[a-f0-9]{64}$'; then
            echo "::warning title=Deploy dispatch skipped::'$DIGEST' is not a valid sha256 digest; not dispatching. The release is published."
            exit 1
          fi
          echo "Dispatching deploy for $VERSION ($DIGEST)"

      - name: 🤖 Mint the infra-dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.INFRA_DISPATCH_APP_ID }}
          private-key: ${{ secrets.INFRA_DISPATCH_APP_PRIVATE_KEY }}
          owner: marcusrbrown
          repositories: infra
          permission-actions: write

      - name: 🚀 Dispatch infra deploy-dashboard
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.tag }}
          DIGEST: ${{ needs.release.outputs.digest }}
        run: |
          # Best-effort: the image is already published. A dispatch failure annotates
          # but does not fail — infra can be triggered manually as a fallback.
          if gh workflow run deploy-dashboard.yaml \
              --repo marcusrbrown/infra \
              --ref main \
              -f version="$VERSION" \
              -f digest="$DIGEST"; then
            echo "Dispatched deploy-dashboard for $VERSION (digest $DIGEST) — awaiting operator approval in infra."
          else
            rc=$?
            echo "::warning title=Deploy dispatch failed::Could not dispatch infra deploy-dashboard for $VERSION (exit $rc). The image is published; trigger the infra deploy manually. A 422 means the infra input contract changed (e.g. a renamed input)."
          fi
