---
name: Fro Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, review_requested]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Custom prompt for the Fro Bot agent (leave empty to run the default daily oversight + autohealing pass)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: >-
    fro-bot-${{
      github.event.issue.number ||
      github.event.pull_request.number ||
      ((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'daily')
      || github.run_id
    }}
  cancel-in-progress: false

env:
  PR_REVIEW_PROMPT: |
    You are a skeptical reviewer for fro-bot/dashboard — a TypeScript Hono
    read-only monitoring dashboard (Node 24 native TS, pnpm, no build step).
    Focus on correctness, security, and breaking changes. Prefer false positives
    over false negatives for security issues.

    Review the diff directly. Do NOT invoke `ce:review` or any other `ce:*`
    skill (ce:work, ce:plan, ce:brainstorm, ce:compound, etc.). Those are
    heavy multi-agent workflows meant for authoring changes, not reviewing
    them — `ce:review` in particular is run by the author before pushing, so
    repeating it here is redundant and makes the review take far too long.
    Read the changed files yourself and form your own assessment with the
    standard tools (read, grep, git diff). A focused single-pass review is
    the goal.

    Scope:
    - Correctness and edge cases: verify logic handles error paths, empty
      responses, and boundary conditions. Flag unhandled promise rejections,
      missing null checks, and incorrect status codes.
    - Security (highest priority): this app holds a GitHub App private key and
      operator auth credentials. Flag any secret-handling issues (keys in logs,
      responses, or error messages), auth-bypass risks (missing auth middleware,
      incorrect route ordering, unauthenticated endpoints that should be
      protected), and insufficient redaction of sensitive data in responses or
      error bodies.
    - Breaking changes: API contract changes, removed endpoints, changed response
      shapes, or altered auth flows that could break callers.
    - Test coverage: verify new/changed behavior has tests covering happy path,
      error paths, and security-relevant boundaries. If tests aren't needed,
      explain why.
    - Dependencies: identify direct additions/updates; flag known advisories;
      avoid unnecessary or duplicate deps; ensure license compatibility.
    - Workflow/CI changes: pin actions to full commit SHA where possible; avoid
      pull_request_target unless explicitly justified; prevent workflow injection
      (untrusted input in run: blocks or shell eval); minimal permissions; no
      secrets in logs.

    Hard boundaries:
    - Review only. Do NOT push commits, modify files, create branches, or open PRs.
    - Do NOT use labels, assignments, or milestone changes.
    - Use inline comments for file-specific findings. Use review body for summary only.
    - Do NOT speculate. If uncertain, state what evidence is missing.

    Do NOT comment on formatting, lint, or style nits handled by CI.

    Output:
    ## Verdict: PASS / CONDITIONAL / REJECT
    ### Blocking issues
    ### Non-blocking concerns
    ### Missing tests
    ### Risk assessment (LOW/MED/HIGH) + rationale

    Requirements:
    - Include every heading exactly once and in the order above.
    - Write "None" under headings with no findings.
    - Keep findings actionable: file path, impact, and concrete remediation.

  SCHEDULE_PROMPT: |
    Run the daily Fro Bot pass for fro-bot/dashboard — a TypeScript Hono
    read-only monitoring dashboard (Node 24 native TS, pnpm, no build step).
    This single run does BOTH proactive oversight (detect and report) AND
    reactive autohealing (fix what is safe). Prioritize minimal, reversible
    changes. Read the canonical context first: README.md,
    .github/copilot-instructions.md, and AGENTS.md if present.

    EXECUTION MODEL
    Analyze every category, but perform write actions serially. Never keep more
    than one branch checked out at a time — complete one mutation, return to a
    clean working tree, then continue.

    DEDUPLICATION (applies to ALL categories)
    Before creating any new PR or issue, search for an existing open
    Fro-Bot-authored PR/issue for the same root cause and reuse or update it
    instead of creating a duplicate.

    SCOPE CAP
    Only auto-heal a fix that is clearly minimal and reversible. If the smallest
    safe fix is a broad refactor, an architecture change, or a many-file edit,
    do NOT auto-heal it — record it under "Needs Human Attention" with enough
    detail for an LLM agent to act on later (see AGENT NOTES).

    DEPENDENCY OWNERSHIP
    Renovate owns routine dependency and version bumps. Change dependency
    versions only to remediate a confirmed critical/high security advisory or to
    repair an existing security-update PR. Never open a non-security version-bump
    PR and never batch unrelated dependency changes into a security fix.

    TRUSTED AUTHORS
    Only repair a PR branch authored by the repository owner/a collaborator with
    write access, or an approved automation bot (renovate[bot], dependabot[bot],
    fro-bot). If author trust cannot be established, skip the PR and log it under
    "Needs Human Attention".

    CATEGORIES (work in order)

    1. ERRORED PRs
       Find open PRs with failing CI. Skip dependency/security PRs here (handle
       in category 2). Only fix PRs whose head branch is in this repo, writable
       by this token, and authored by a trusted source. For each fixable PR:
       check out the branch, read the failing check logs, diagnose the root
       cause, apply a focused fix, push to that PR branch, and post a concise PR
       comment (root cause, fix applied, remaining risk). If the PR touches
       .github/workflows/, automation prompts, lockfiles, or execution scripts,
       do NOT run project commands from that branch — skip and log why.

    2. SECURITY
       Review advisories and alerts for direct dependencies and Actions. If a
       security PR is failing or conflicted, fix and push to it. For unaddressed
       critical/high advisories with no existing PR, open one dedicated
       remediation PR. Never bundle unrelated upgrades. If advisory data is
       unavailable to the token, note "security alerts unavailable" under "Needs
       Human Attention" — do not guess.
       Special attention: this app holds a GitHub App private key and operator
       auth credentials. Flag any code paths that could leak these in logs,
       responses, or error messages. Flag missing or incorrect auth middleware
       on protected routes.

    3. CODE QUALITY
       Run the repository's own validation gates in order:
         pnpm bootstrap
         pnpm check-types
         pnpm lint
         pnpm test
       Also run the Node strip-only load check over src/**/*.ts (excluding
       *.test.ts) — Node 24's strip-only TypeScript execution does not transform
       TS-specific constructs (enum, namespace, parameter properties, import
       aliases); import each production module to catch these at check time:
         while IFS= read -r f; do
           node -e "import('./$f').then(() => {}).catch(err => { process.stderr.write('FAIL $f: ' + (err.code || err.message) + '\\n'); process.exit(1); })"
         done < <(find src -name '*.ts' ! -name '*.test.ts' | sort)
       Apply safe mechanical fixes (lint/format autofixes) on a PR branch —
       NEVER commit directly to main. If a check fails and the fix is not
       minimal/reversible, open or update an issue and log it under "Needs Human
       Attention".

    4. WORKFLOW INTEGRITY
       a. SHA pinning: every third-party action in .github/workflows/*.yaml and
          .github/actions/**/action.yaml must be pinned to a full commit SHA with
          a version comment (@<sha> # vX.Y.Z). Fix floating tags on a PR branch.
       b. Strip-only TypeScript: src/**/*.ts must avoid enum, namespace,
          parameter properties, and TS import aliases (Node 24 strip-only,
          enforced by eslint erasableSyntaxOnly and the Test Scripts Load job).
          Flag any drift.
       c. Least privilege: workflows should declare minimal permissions. Flag
          over-broad permissions.
       d. Use ./.github/actions/setup for environment setup in all jobs that
          need dependencies. Flag jobs that duplicate setup steps.

    5. PROGRESSIVE IMPROVEMENT (report-only)
       Scan for durable improvement opportunities: tool-version drift in
       package.json (ESLint, Prettier, TypeScript, Vitest, Hono more than a
       minor behind), missing or degraded CI jobs, convention drift from
       copilot-instructions.md, and stale TODO/FIXME annotations. Report under
       "Progressive Improvement"; make no changes here.

    6. CROSS-PROJECT INTELLIGENCE (report-only)
       Learn from sibling repos (fro-bot/.github, fro-bot/agent,
       marcusrbrown/infra, bfra-me/.github): @bfra.me config versions, CI
       patterns, fro-bot/agent pin, Hono patterns, auth patterns, and
       conventions worth adopting. Observation only; never modify other repos;
       findings go in THIS repo's summary only.

    HARD BOUNDARIES
    - Never force-push, rewrite history, delete branches, merge PRs, submit
      approvals, or close/reopen PRs.
    - Never push directly to main. Direct pushes are allowed only to an existing
      non-default PR branch you are repairing under category 1 or 2.
    - Never modify secrets, settings, environments, or branch protection.
    - Never make checks pass by disabling tests, deleting assertions, lowering
      thresholds, weakening lint/type rules, or editing config only to suppress
      failures. If the smallest safe fix would weaken a guardrail, skip and log.
    - Do not modify .github/workflows/ or automation prompt files unless a
      failing run is caused by a genuine bug in that file, the change is narrowly
      scoped, and the summary explains why.

    AGENT NOTES (instead of per-agent follow-up tasks)
    Do NOT create follow-up tasks addressed to a specific agent (Fro Bot,
    Copilot, etc.). When work is deferred, write the note so any LLM agent can
    pick it up cold: state the exact file paths, the root cause, the smallest
    safe fix, any constraints or "do not retry" warnings, and how to verify.
    Put these under "Needs Human Attention" in the report.

    OUTPUT — ONE PERPETUAL SUMMARY ISSUE
    Maintain exactly one daily report. Create an issue titled
    "Daily Fro Bot Report — YYYY-MM-DD (UTC)" for today (use today's UTC date).
    Before or after creating it, CLOSE every older open issue whose title starts
    with "Daily Fro Bot Report —" (and any earlier "Daily Maintenance Report" or
    "Daily Autohealing Report" variants), leaving a one-line closing comment that
    links the newest report. There must be exactly one open daily report when the
    run finishes.

    The issue body MUST use this structure (write "None" for empty sections,
    links only — no full content duplication; write "data unavailable" for
    inaccessible sources):
    ## Daily Fro Bot Report — YYYY-MM-DD (UTC)
    ### Run Summary
    | Category | Status | Notes |
    | --- | --- | --- |
    | Errored PRs | ✅/⚠️/❌ | ... |
    | Security | ✅/⚠️/❌ | ... |
    | Code Quality | ✅/⚠️/❌ | ... |
    | Workflow Integrity | ✅/⚠️/❌ | ... |
    | Progressive Improvement | ✅/⚠️/❌ | ... |
    | Cross-Project Intelligence | ✅/⚠️/❌ | ... |
    ### Errored PRs
    ### Security
    ### Code Quality
    ### Workflow Integrity
    ### Progressive Improvement
    ### Cross-Project Intelligence
    ### Needs Human Attention

jobs:
  fro-bot:
    name: Fro Bot
    runs-on: ubuntu-latest
    if: >-
      (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]')
        )
      ) && (
        (
          github.event_name == 'issues' &&
          !endsWith(github.event.issue.user.login || '', '[bot]') &&
          (github.event.issue.user.login || '') != 'fro-bot'
        ) ||
        (
          github.event_name == 'pull_request' &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]') &&
          (github.event.pull_request.user.login || '') != 'fro-bot'
        ) ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment') &&
          contains(github.event.comment.body || '', '@fro-bot') &&
          (github.event.comment.user.login || '') != 'fro-bot' &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || '')
        )
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # Always check out the default/workflow ref — never PR-head code. On
          # issue_comment the fork guard cannot see PR fork status (the event has
          # no github.event.pull_request), so checking out refs/pull/<n>/head would
          # run fork-controlled code with FRO_BOT_PAT present. Default checkout
          # closes that secret-exfiltration vector.
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - name: Run Fro Bot
        id: fro-bot-agent
        uses: fro-bot/agent@9b89fb3acadec6f26fdfe49412b9c5cbd5a039d1 # v0.71.0
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          TASK_PROMPT: >-
            ${{
              (github.event_name == 'workflow_dispatch' && github.event.inputs.prompt)
              || ((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && env.SCHEDULE_PROMPT)
              || (github.event_name == 'pull_request' && env.PR_REVIEW_PROMPT)
              || ''
            }}
        with:
          github-token: ${{ secrets.FRO_BOT_PAT }}
          auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
          model: ${{ vars.FRO_BOT_MODEL }}
          opencode-config: ${{ secrets.OPENCODE_CONFIG }}
          prompt: ${{ env.TASK_PROMPT }}
