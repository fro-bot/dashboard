# Continuous Integration jobs for changes headed to main.
---
name: Main

on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review, reopened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash -Eeuo pipefail {0}

jobs:
  lint:
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.head_ref }}

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - env:
          TIMING: 1
        name: 💅🏽 Lint
        run: pnpm lint

  design-check:
    name: Design Check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.head_ref }}

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - name: 🎨 Detect UI anti-patterns
        run: |
          # Pinned: an older major ignores .impeccable/config.json ignoreValues and would fail the gate on intentional brand tokens.
          findings=$(npx --yes impeccable@3.2.1 detect --json web/src)
          if [ "$findings" != "[]" ]; then
            echo "$findings"
            echo "Impeccable detected UI anti-patterns. Address them or, for an intentional brand choice, add a scoped ignore via 'impeccable ignores add-value'."
            exit 1
          fi
          echo "No UI anti-patterns detected."

  check-types:
    name: Check Types
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.head_ref }}

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - name: ✅ Validate Types
        run: pnpm check-types

  test:
    name: Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.head_ref }}

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - name: 🏗 Build web
        run: pnpm build:web

      - name: 🧪 Run Tests
        run: pnpm test

  check-workflows:
    name: Check Workflows
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.head_ref }}

      - name: 🛠 Lint Workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  test-scripts-load:
    name: Test Scripts Load
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.head_ref }}

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - name: 🧪 Load production scripts under Node strip-only
        # Node 24's strip-only TypeScript execution only erases type annotations -- it does
        # not transform TS-specific class constructs (parameter properties, enum, namespace).
        # Neither `tsc --noEmit` nor Vitest exercise the strip-only parser, so those runtime
        # errors used to surface only at runtime. Importing each production module here catches
        # them at merge time instead. Recursive over src/ so nested modules (routes/, github/,
        # auth/) are covered as the app grows, excluding tests.
        run: |
          while IFS= read -r f; do
            node -e "import('./$f').then(() => {}).catch(err => { process.stderr.write('FAIL $f: ' + (err.code || err.message) + '\\n'); process.exit(1); })"
            echo "  ok   $f"
          done < <(find src -name '*.ts' ! -name '*.test.ts' | sort)
